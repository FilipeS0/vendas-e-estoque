<div class="page-wrap">
  <mat-card class="page-card">
    <mat-card-header>
      <mat-card-title>Fornecedores</mat-card-title>
      <mat-card-subtitle>Fornecedores de produtos cadastrados</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      @if (isLoading()) {
        <div class="loading-wrap"><mat-spinner diameter="40"></mat-spinner></div>
      } @else {
        <table mat-table [dataSource]="dataSource()" class="full-table">
          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let f">{{ f.nome }}</td>
          </ng-container>
          <ng-container matColumnDef="cnpj">
            <th mat-header-cell *matHeaderCellDef>CNPJ</th>
            <td mat-cell *matCellDef="let f">{{ f.cnpj ?? '—' }}</td>
          </ng-container>
          <ng-container matColumnDef="telefone">
            <th mat-header-cell *matHeaderCellDef>Telefone</th>
            <td mat-cell *matCellDef="let f">{{ f.telefone ?? '—' }}</td>
          </ng-container>
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>E-mail</th>
            <td mat-cell *matCellDef="let f">{{ f.email ?? '—' }}</td>
          </ng-container>
          <ng-container matColumnDef="ativo">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let f">
              <mat-chip [color]="f.ativo !== false ? 'primary' : ''" highlighted>
                {{ f.ativo !== false ? 'Ativo' : 'Inativo' }}
              </mat-chip>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      }
    </mat-card-content>
  </mat-card>
</div>
