<div class="page-wrap">
  <mat-card class="page-card">
    <mat-card-header>
      <mat-card-title>Categorias</mat-card-title>
      <mat-card-subtitle>Categorias de produtos cadastradas</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      @if (isLoading()) {
        <div class="loading-wrap"><mat-spinner diameter="40"></mat-spinner></div>
      } @else {
        <table mat-table [dataSource]="dataSource()" class="full-table">
          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let c">{{ c.nome }}</td>
          </ng-container>
          <ng-container matColumnDef="descricao">
            <th mat-header-cell *matHeaderCellDef>Descrição</th>
            <td mat-cell *matCellDef="let c">{{ c.descricao ?? '—' }}</td>
          </ng-container>
          <ng-container matColumnDef="ativo">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let c">
              <mat-chip [color]="c.ativo !== false ? 'primary' : ''" highlighted>
                {{ c.ativo !== false ? 'Ativo' : 'Inativo' }}
              </mat-chip>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      }
    </mat-card-content>
  </mat-card>
</div>
