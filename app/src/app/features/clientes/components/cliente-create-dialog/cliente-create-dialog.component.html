<h2 mat-dialog-title>Novo cliente</h2>
<mat-dialog-content class="dialog-content">
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="nome" autocomplete="name" />
      @if (form.controls.nome.invalid && form.controls.nome.touched) {
        <mat-error>O nome é obrigatório.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>CPF</mat-label>
      <input
        matInput
        formControlName="cpf"
        maxlength="14"
        autocomplete="off"
        (input)="formatCpf($event)"
        placeholder="000.000.000-00"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Telefone</mat-label>
      <input matInput formControlName="telefone" autocomplete="tel" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Limite de crédito</mat-label>
      <input matInput type="number" formControlName="limiteCredito" min="0" />
      @if (form.controls.limiteCredito.invalid && form.controls.limiteCredito.touched) {
        <mat-error>O limite deve ser maior ou igual a 0.</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="form.invalid || isSaving">
    Criar cliente
  </button>
</mat-dialog-actions>
