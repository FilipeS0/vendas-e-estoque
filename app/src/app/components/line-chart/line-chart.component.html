<div class="line-chart-wrapper">
  <svg viewBox="0 0 400 120" preserveAspectRatio="none" class="line-chart-svg">
    <polyline
      [attr.points]="points"
      fill="none"
      stroke="#3f51b5"
      stroke-width="2"
      stroke-linejoin="round"
      stroke-linecap="round"
    ></polyline>
  </svg>
</div>
