<div class="sidebar-shell" [class.collapsed]="!sidebarOpen()">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <span>ERP</span>
      <small>Vendas</small>
    </div>
    <button mat-icon-button type="button" aria-label="Alternar sidebar" (click)="toggleSidebar()">
      <mat-icon>chevron_left</mat-icon>
    </button>
  </div>

  <mat-nav-list>
    <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
      <mat-icon>dashboard</mat-icon>
      <span class="nav-text">Dashboard</span>
    </a>
    <a mat-list-item routerLink="/pos" routerLinkActive="active-link">
      <mat-icon>point_of_sale</mat-icon>
      <span class="nav-text">PDV</span>
    </a>
    <a mat-list-item routerLink="/produtos" routerLinkActive="active-link">
      <mat-icon>inventory_2</mat-icon>
      <span class="nav-text">Produtos</span>
    </a>
    <a mat-list-item routerLink="/clientes/1" routerLinkActive="active-link">
      <mat-icon>people</mat-icon>
      <span class="nav-text">Clientes</span>
    </a>
  </mat-nav-list>

  <div class="sidebar-footer">
    <span>Versão</span>
    <strong>1.0</strong>
  </div>
</div>
